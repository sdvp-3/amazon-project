<!doctype html>
<html>
  <head>
    <title>Amazon Project</title>

     <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"

    />
  <link rel="stylesheet" href="../STYLES-2/body-section.css">
  <link rel="stylesheet" href="../STYLES-2/header-section.css">

  <body>

    <div class="head-section">

      <div class="left-section">

        <a href="amazon.html" class="header-link">

<img class="amazon-logo-mobile" src="../images/amazon-mobile-logo-white.png" />
  
        </a>
      </div>

      <div class="mid-section">
        <input class="search-bar" type="text" placeholder="Search" />

        <button class="search-icon1">
          <img
            class="search-icon2"
            src="../images/products/icons/search-icon.png"
          />
        </button>
      </div>

      <div class="right-section">
        <a href="../orders.html" class="header-links">
          <span class="return-text">Returns</span>
          <span class="return-order">& Orders</span>

          <div class="cart-text">Cart</div>

    <div class="js-hamburg-menu hamburg-menu">

      <a  class="hamburg-tex" href="../orders.html" >Returns & Orders</a>
      <a  class="hamburg-text2" href="../checkout.html "   data-testid="cart-quantity"  >Item(0)</a>

    </div>

    <div class="body-grid  js-product-grid ">

    </div>
<script type="module" src="../SCRIPTS-2/amazon.js"></script>
