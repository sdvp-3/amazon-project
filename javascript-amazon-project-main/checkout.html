<!DOCTYPE html>
<html>
  <head>
    <title>  Checkout </title>

      <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="checkout-header.css">

  </head>

  <body>

    <div class="header-section">

      <div class="header-content">

        <div class="left-sec">
          <a href="../javascript-amazon-project-main/amazon-html/amazon.html">

<img class="amazon-logo " src="images/amazon-logo.png">

          <img class="amazon-logo-mobile " src="images/amazon-mobile-logo.png">
          </a>

          
        
        </div>

        <div class="mid-sec">Checkout(   <a href="../javascript-amazon-project-main/amazon-html/amazon.html" class="return-to-home" data-testid="cart-quantity" style="text-decoration: none;"> 0 Items</a>)</div>

        <div class="right-sec"><img class="checkout-lock-icon" src="images/products/icons/checkout-lock-icon.png"></div>

      </div>

    </div>

    <div class="main">

      <div class="orders-title">Review Your Orders</div>


      <div class="checkout-grid">

        <div class="order-summary js-order-summary">

        </div>

       

           <div class="payment-summary">

          <div class="order-title">Order Summary</div>

          <div class="payment-summry-row">
            <div>Items (2):</div>
            <div class="items-price">$15.98</div>
          </div>

           <div class="payment-summry-row">

            <div>Shipping & handling:</div>

            <div class="items-price"> $9.99 </div>

           </div>

           <div class="payment-summry-row subtotal-row">
            <div>Total before tax:</div>
            <div class="items-price">$25.97</div>
          </div>

            <div class="payment-summry-row">
             <div>Estimated tax (10%):</div>
              <div>$2.60</div>
             </div>

             <div class="payment-summry-row-total" >

              <div>
                Order total:
              </div>
              <div>
                $28.57
              </div>

            </div>
             <div class="buttons">
              <button class="place-order">Place your order</button>
             </div>

        </div>
         
        </div>

      </div>

    </div>
<script type="module" src="SCRIPTS-2/checkout.js"></script>
  </body>
</html>
